fragment PageParts on Page {
  __typename
  title
  seoDescription
  blocks {
    __typename
    ... on PageBlocksHero {
      eyebrow
      headline
      subheadline
      primaryCtaLabel
      primaryCtaLink
      secondaryCtaLabel
      secondaryCtaLink
      imageUrl
      imageAlt
      layout
    }
    ... on PageBlocksServiceGrid {
      eyebrow
      heading
      subheading
      services {
        __typename
        title
        description
        icon
      }
      columns
    }
    ... on PageBlocksContentSplit {
      eyebrow
      heading
      body
      ctaLabel
      ctaLink
      imageUrl
      imageAlt
      imagePosition
    }
    ... on PageBlocksStatsBar {
      eyebrow
      heading
      stats {
        __typename
        value
        label
        prefix
      }
    }
    ... on PageBlocksTestimonialCarousel {
      eyebrow
      heading
      testimonials {
        __typename
        quote
        authorName
        authorTitle
        avatarUrl
      }
    }
    ... on PageBlocksLogoCloud {
      label
      logos {
        __typename
        name
        imageUrl
      }
    }
    ... on PageBlocksFaq {
      eyebrow
      heading
      subheading
      items {
        __typename
        question
        answer
      }
    }
    ... on PageBlocksContactForm {
      eyebrow
      heading
      subheading
      formspreeId
      successMessage
      fields {
        __typename
        label
        name
        type
        required
        placeholder
      }
      showAddress
      phone
      email
      address
    }
  }
}

fragment SettingsParts on Settings {
  __typename
  siteName
  siteTagline
  logoText
  logoImage
  navLinks {
    __typename
    label
    href
  }
  navCtaLabel
  navCtaLink
  footerTagline
  footerLinks {
    __typename
    label
    href
  }
  copyrightText
  googleFontsUrl
  socialLinks {
    __typename
    platform
    url
  }
}
